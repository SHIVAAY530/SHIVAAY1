<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRNTechNest Login</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff7a00,#6a0dad);
}

.login-box{
    background:white;
    padding:30px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 20px rgba(0,0,0,.3);
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#6a0dad;
    color:white;
    cursor:pointer;
}

#msg{
    text-align:center;
    margin-top:10px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>SRNTechNest Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script>

async function login(){

const username=document.getElementById("username").value;
const password=document.getElementById("password").value;

const formData=new URLSearchParams();
formData.append("username",username);
formData.append("password",password);

try{

const response=await fetch(
"https://script.google.com/macros/s/AKfycbyrcDciWIgUnZuWS2pmr6ndC5yuTvqgcsNv7YJEt8wRN-ETa-q1rRAM1vNhfZ-sd2E/exec",
{
method:"POST",
body:formData
});

const data=await response.json();

if(data.success){

localStorage.setItem("role",data.role);

if(data.role==="Admin"){
window.location="admin.html";
}
else if(data.role==="Staff"){
window.location="staff.html";
}
else{
window.location="client.html";
}

}
else{
document.getElementById("msg").innerHTML="Invalid Login";
}

}catch(err){
document.getElementById("msg").innerHTML = err.message;
console.error(err);
alert(err.message);
}
}

</script>

</body>
</html>
