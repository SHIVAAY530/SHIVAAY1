<!DOCTYPE html>
<html>
<head>

<title>SHIVAAY TECH Login</title>
  <link rel="icon" href="./assets/images/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#1c262f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{

    width:400px;

    background:#212d37;

    padding:40px;

    border:2px solid transparent;

    border-image:linear-gradient(
        to right,
        #FF8400,
        #7B2CFF
    ) 1;
}

h2{
    text-align:center;
}

select,input,button{

    width:100%;

    padding:15px;

    margin-top:15px;

    box-sizing:border-box;
}

button{

    border:none;

    color:white;

    cursor:pointer;

    background:linear-gradient(
        to right,
        #FF8400,
        #7B2CFF
    );
}

</style>

</head>
<body>

<div class="login-box">

<h2>SRNTechNest Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>

<script>
async function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

try{

const response = await fetch(
`https://script.google.com/macros/s/AKfycbyrcDciWIgUnZuWS2pmr6ndC5yuTvqgcsNv7YJEt8wRN-ETa-q1rRAM1vNhfZ-sd2E/exec?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
);

const data = await response.json();

console.log(data);

if(data.success){

localStorage.setItem("role", data.role);

if(data.role==="Admin"){
    window.location.href="admin/admin.html";
}
else if(data.role==="Staff"){
    window.location.href="staff/staff.html";
}
else{
    window.location.href="client/client.html";
}
}
else{
document.getElementById("msg").innerHTML = "Invalid Login";
}

}
catch(err){

console.error(err);
document.getElementById("msg").innerHTML = err.message;

}
}
</script>

</body>
</html>
