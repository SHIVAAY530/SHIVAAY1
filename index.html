
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShivaayTech — Digital Card</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:Inter,system-ui,sans-serif;
      background:#020617;
      color:white;
      min-height:100vh;
      overflow-x:hidden;
      user-select:none;
      -webkit-user-select:none;

      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .glass{
      background:rgba(255,255,255,.05);

      border:1.5px solid transparent;

      background-image:
      linear-gradient(#020617,#020617),
      linear-gradient(135deg,#f97316,#a855f7);

      background-origin:border-box;
      background-clip:padding-box,border-box;

      backdrop-filter:blur(16px);
    }

    .gradient-text{
      background:linear-gradient(
      90deg,
      #fff,
      #a855f7,
      #6366f1);

      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .card-hover{
      transition:.3s;
    }

    .card-hover:hover{
      transform:translateY(-6px);
    }
  </style>

</head>

<body>

<section class="w-full max-w-md md:max-w-2xl">

  <div
  id="hero-card"
  class="glass rounded-[2rem] p-6 md:p-10 text-center">

    <!-- Brand -->

    <div class="mb-8">

      <h1
      class="text-4xl md:text-6xl font-black gradient-text mb-3">

      𝒮𝒽𝒾𝓋𝒶𝒶𝓎𝒯𝑒𝒸𝒽

      </h1>

      <p
      class="text-slate-300 text-sm md:text-lg">

        Turning Bold Ideas Into Scalable Digital Ventures

      </p>

    </div>


    <!-- Contact -->

    <div
    class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">

      <a
      href="mailto:contact@shivaaytech.in"
      class="glass rounded-2xl p-4 card-hover">

        ✉ contact@shivaaytech.in

      </a>


      <a
      href="https://wa.me/917259871530"
      target="_blank"
      class="glass rounded-2xl p-4 card-hover">

        💬 WhatsApp Now

      </a>


      <a
      href="https://shivaaytech.in"
      target="_blank"
      class="glass rounded-2xl p-4 card-hover md:col-span-2">

        🌐 shivaaytech.in

      </a>

    </div>


    <!-- Services -->

    <div
    class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm text-slate-300">

      <div>💻 Web</div>

      <div>📱 Mobile</div>

      <div>🎓 Training</div>

      <div>🏭 Industry Projects</div>

    </div>

  </div>

</section>


<script>

const hero =
document.getElementById("hero-card");


document.addEventListener(
"mousemove",
(e)=>{

if(hero){

const x =
(e.clientX/window.innerWidth-.5)*6;

const y =
(e.clientY/window.innerHeight-.5)*6;

hero.style.transform =
`rotateY(${x}deg) rotateX(${-y}deg)`;

}

});


document.addEventListener(
"contextmenu",
e=>e.preventDefault()
);

document.addEventListener(
"copy",
e=>e.preventDefault()
);

document.addEventListener(
"selectstart",
e=>e.preventDefault()
);

</script>


</body>
</html>
